<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPINDLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg0:#ede8e0;
  --bg1:#e4ddd5;
  --glass:rgba(255,255,255,.45);
  --glass-hover:rgba(255,255,255,.62);
  --glass-border:rgba(0,0,0,.08);
  --glass-border-strong:rgba(0,0,0,.16);
  --ink:#1a1410;
  --ink2:rgba(20,16,10,.68);
  --muted:rgba(20,16,10,.38);
  --accent:#7c3aed;
  --accent2:#0ea5e9;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --blur:blur(28px) saturate(1.8);
  --blur-sm:blur(14px) saturate(1.6);
  --radius:18px;
  --radius-sm:12px;
  --sh-glass:0 8px 32px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.7);
  --sh-card:0 20px 60px rgba(0,0,0,.2);
}

html,body{
  background:var(--bg0);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.7s ease;
}

/* ambient glow blob */
#glow-blob{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80vw 70vh at 50% 40%, rgba(120,80,255,.08) 0%, transparent 70%);
  transition:background .7s ease;
}

/* noise grain */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
}

/* ── GLASS MIXIN helpers ────────────────── */
.glass{
  background:var(--glass);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
}
.glass-sm{
  background:var(--glass);
  backdrop-filter:var(--blur-sm);
  -webkit-backdrop-filter:var(--blur-sm);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
}

/* ══ SETUP ══════════════════════════════ */
#setup{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;
}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(0,0,0,.08);
  pointer-events:none;
}
.inner{position:relative;z-index:2;width:100%;max-width:400px}

.logo{
  font-family:var(--font-display);
  font-size:clamp(4rem,12vw,7rem);
  color:#fff;
  line-height:.9;
  letter-spacing:.08em;
  margin-bottom:.3rem;
  text-shadow:0 2px 20px rgba(100,40,200,.18);
}
.logo span{
  background:linear-gradient(135deg,#7c3aed 0%,#0ea5e9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tagline{
  font-size:9px;letter-spacing:.22em;color:var(--muted);
  margin-bottom:2.5rem;
}

.field{margin-bottom:.9rem}
.field label{
  display:block;font-size:8px;letter-spacing:.22em;
  color:var(--muted);margin-bottom:6px;
}
.field input{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid var(--glass-border);
  color:#fff;
  font-family:var(--font-body);font-weight:700;
  font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  padding:11px 16px;
  border-radius:var(--radius-sm);
  outline:none;
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  transition:border-color .2s, box-shadow .2s;
  box-shadow:var(--sh-glass);
}
.field input::placeholder{color:var(--muted);text-transform:uppercase}
.field input:focus{
  border-color:rgba(170,100,255,.6);
  box-shadow:0 0 0 3px rgba(170,100,255,.18), var(--sh-glass);
}
.hint{font-size:8px;color:var(--muted);margin-top:5px;line-height:1.7;text-transform:none;letter-spacing:.02em;font-weight:400}
.hint a{color:var(--accent);text-decoration:none}

.btn-main{
  width:100%;margin-top:.4rem;padding:14px;
  background:linear-gradient(135deg,rgba(124,58,237,.8) 0%,rgba(14,165,233,.7) 100%);
  border:1px solid rgba(124,58,237,.5);
  color:#fff;font-family:var(--font-body);font-weight:800;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  border-radius:var(--radius-sm);cursor:pointer;
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  box-shadow:0 4px 24px rgba(124,58,237,.3), var(--sh-glass);
  transition:all .2s;
}
.btn-main:hover{
  background:linear-gradient(135deg,rgba(109,40,217,.9) 0%,rgba(8,145,178,.8) 100%);
  box-shadow:0 8px 32px rgba(124,58,237,.4), var(--sh-glass);
  transform:translateY(-1px);
}
.btn-main:active{transform:translateY(0)}

.divider{
  height:1px;background:var(--glass-border);
  margin:1.4rem 0;position:relative;
}
.divider::after{
  content:'OR';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:var(--bg0);padding:0 12px;color:var(--muted);
  font-size:8px;letter-spacing:.2em;color:var(--muted);
}
.btn-sec{
  width:100%;padding:12px;
  background:rgba(255,255,255,.5);
  border:1px solid var(--glass-border);
  color:var(--ink2);font-family:var(--font-body);font-weight:700;
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  border-radius:var(--radius-sm);cursor:pointer;
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  transition:all .2s;margin-bottom:.5rem;
}
.btn-sec:hover{background:rgba(255,255,255,.1);border-color:var(--glass-border-strong);color:#fff}
.errbox{
  display:none;margin-top:.8rem;padding:10px 16px;
  background:rgba(255,60,60,.1);border:1px solid rgba(255,80,80,.3);
  border-radius:var(--radius-sm);color:#ff9090;
  font-size:10px;line-height:1.6;text-transform:none;font-weight:400;
}

/* ══ LOADING ════════════════════════════ */
#loading{
  min-height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;text-align:center;position:relative;z-index:2;
}
.vspin{
  width:80px;height:80px;border-radius:50%;
  border:1.5px solid rgba(200,150,255,.4);
  border-top-color:var(--accent);
  animation:spin 1.2s linear infinite;
  margin-bottom:2rem;
  box-shadow:0 0 30px rgba(170,100,255,.3);
}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:var(--font-display);font-size:2rem;color:#fff;letter-spacing:.1em;margin-bottom:.4rem}
.ls{color:var(--muted);font-size:10px;letter-spacing:.1em;min-height:18px;margin-bottom:1.5rem;text-transform:uppercase}
.pw{width:240px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width .3s ease;width:0%}
.lc{margin-top:.9rem;font-size:8px;letter-spacing:.15em;color:var(--muted);min-height:14px}

/* ══ APP ════════════════════════════════ */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:2}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:1rem;
  padding:.8rem 2rem;
  border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;z-index:200;
  background:rgba(237,232,224,.82);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
}
.tlogo{
  font-family:var(--font-display);font-size:1.6rem;
  color:#fff;letter-spacing:.1em;flex-shrink:0;
  
}
.tlogo span{
  background:linear-gradient(135deg,#c8f,#a8efff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-tabs{display:flex;gap:4px}
.ntab{
  padding:5px 14px;
  background:transparent;
  border:1px solid transparent;
  color:var(--muted);
  font-family:var(--font-body);font-weight:700;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  border-radius:8px;cursor:pointer;transition:all .15s;
}
.ntab:hover{color:var(--ink2);border-color:var(--glass-border)}
.ntab.on{
  background:rgba(255,255,255,.1);
  border-color:var(--glass-border-strong);
  color:#fff;
}
.np{
  display:flex;align-items:center;gap:10px;
  flex:1;opacity:0;transition:opacity .3s;
  min-width:0;justify-content:center;
}
.np.on{opacity:1}
.wave{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0}
.wb{
  width:2px;border-radius:1px;
  background:linear-gradient(to top,var(--accent),var(--accent2));
  animation:wv .6s ease-in-out infinite alternate;
}
.wb:nth-child(1){animation-delay:0s;animation-duration:.5s;height:4px}
.wb:nth-child(2){animation-delay:.1s;animation-duration:.7s;height:10px}
.wb:nth-child(3){animation-delay:.05s;animation-duration:.45s;height:6px}
.wb:nth-child(4){animation-delay:.15s;animation-duration:.62s;height:12px}
.wb:nth-child(5){animation-delay:.08s;animation-duration:.52s;height:8px}
@keyframes wv{from{height:2px}to{height:14px}}
.np-lbl{font-size:7px;letter-spacing:.2em;color:var(--accent);flex-shrink:0}
.np-trk{font-size:10px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;text-transform:uppercase}
.tr{font-size:8px;letter-spacing:.1em;color:var(--muted);text-align:right;flex-shrink:0;margin-left:auto}
.tr strong{color:var(--ink2);font-weight:700}

/* ══ COLLECTION ═════════════════════════ */
#view-collection{display:block}
.hero{
  padding:2.5rem 2rem 1rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
}
.ht{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,5vw,3.5rem);
  letter-spacing:.06em;
  color:#fff;
  line-height:1;
  text-shadow:0 2px 30px rgba(255,255,255,.12);
}
.ht em{
  font-style:normal;
  background:linear-gradient(135deg,#7c3aed,#0ea5e9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hs{font-size:8px;letter-spacing:.18em;color:var(--muted);margin-top:.5rem}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fb{
  padding:5px 14px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--glass-border);
  color:var(--muted);
  font-family:var(--font-body);font-weight:700;
  font-size:8px;letter-spacing:.15em;text-transform:uppercase;
  border-radius:8px;cursor:pointer;
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  transition:all .15s;
}
.fb:hover,.fb.on{
  background:rgba(200,150,255,.18);
  border-color:rgba(200,150,255,.45);
  color:#fff;
}
.srow{
  display:none;
  margin:.5rem 2rem .8rem;padding:1rem 1.5rem;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  flex-wrap:wrap;gap:2rem;
  box-shadow:var(--sh-glass);
}
.sn{
  font-family:var(--font-display);
  font-size:2rem;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--ink),var(--ink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.sl{font-size:7px;letter-spacing:.2em;color:var(--muted);margin-top:3px}

/* ══ CAROUSEL ═══════════════════════════ */
.cw{position:relative;padding:.5rem 0}
.fade-l,.fade-r{
  position:absolute;top:0;bottom:0;width:80px;z-index:10;pointer-events:none;
}
.fade-l{left:0;background:linear-gradient(to right,var(--bg0),transparent)}
.fade-r{right:0;background:linear-gradient(to left,var(--bg0),transparent)}
.cs{
  overflow-x:auto;overflow-y:visible;
  padding:2rem 2rem 4rem;
  scroll-snap-type:x proximity;
  scrollbar-width:thin;
  scrollbar-color:rgba(0,0,0,.15) transparent;
  -webkit-overflow-scrolling:touch;
  cursor:grab;
}
.cs:active{cursor:grabbing}
.cs::-webkit-scrollbar{height:4px}
.cs::-webkit-scrollbar-track{background:transparent}
.cs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
.ct{
  display:flex;
  gap:20px;
  width:max-content;
  padding-right:2rem;
}

/* CAROUSEL ARROWS */
.carr-btn{
  position:absolute;top:50%;z-index:20;
  transform:translateY(-60%);
  width:44px;height:44px;border-radius:50%;
  background:var(--glass);
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  border:1px solid var(--glass-border-strong);
  color:var(--ink);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:var(--sh-glass);
  transition:all .2s;
  line-height:1;
}
.carr-btn:hover{background:var(--glass-hover);transform:translateY(-60%) scale(1.08)}
.carr-prev{left:8px}
.carr-next{right:8px}
.carr-btn:disabled{opacity:.25;cursor:default;transform:translateY(-60%)}

/* CARD — sized so exactly 4 fit across the viewport */
.card{
  /* 4 cards visible: each = (100vw - side-pads - 3 gaps) / 4 */
  width:calc((100vw - 4rem - 60px) / 4);
  flex-shrink:0;
  scroll-snap-align:start;
  cursor:pointer;
  animation:ci .4s ease both;
}
@keyframes ci{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.cov{
  width:100%;
  aspect-ratio:1/1;
  position:relative;
  border-radius:var(--radius);
  overflow:hidden;
  background:rgba(255,255,255,.55);
  border:1px solid var(--glass-border);
  box-shadow:var(--sh-card);
  transition:transform .42s cubic-bezier(.34,1.45,.64,1), box-shadow .42s, border-color .3s;
}
.card:hover .cov{
  transform:scale(1.06) translateY(-8px);
  box-shadow:0 40px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.22);
  border-color:rgba(255,255,255,.3);
}
.cov img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:filter .3s;filter:brightness(.92) saturate(.9);
  border-radius:var(--radius);
}
.card:hover .cov img{filter:brightness(1.05) saturate(1.1)}

/* glass shimmer highlight on top of the cover */
.cov::before{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 50%,rgba(255,255,255,.04) 100%);
  border-radius:var(--radius);
  opacity:0;transition:opacity .3s;
}
.card:hover .cov::before{opacity:1}

/* vinyl sleeve slide */
.sleeve{
  position:absolute;top:0;left:-100%;width:100%;height:100%;
  pointer-events:none;
  transition:left .4s cubic-bezier(.25,.46,.45,.94);
  border-right:1px solid rgba(255,255,255,.06);z-index:1;
  background:radial-gradient(circle at 50% 50%,#0a0a0a 0%,#0a0a0a 14%,#141414 14%,#141414 17%,#0a0a0a 17%,#0a0a0a 35%,#1e1e1e 35%,#1e1e1e 38%,#0a0a0a 38%,#0a0a0a 56%,#141414 56%,#141414 59%,#0a0a0a 59%);
}
.sleeve::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,#c8f,#a8efff);
  box-shadow:0 0 0 3px #0a0a0a, 0 0 12px rgba(200,130,255,.5);
}
.card:hover .sleeve{left:-55%}

/* overlay */
.ov{
  position:absolute;inset:0;z-index:3;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.4) 45%,transparent 100%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;pointer-events:none;
  border-radius:var(--radius);
}
.card:hover .ov{opacity:1}
.ovs{
  font-size:7px;letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:3px;color:rgba(255,255,255,.5);
}
.ovs.has{color:#c8f}
.ovs.none{color:rgba(255,255,255,.25)}
.ovt{font-size:9px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr{
  position:absolute;top:10px;right:10px;z-index:4;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .22s;
}
.pr svg{fill:white}
.card:hover .pr{opacity:1}
.card.playing .pr{
  background:rgba(200,130,255,.3);
  border-color:rgba(200,130,255,.6);
  animation:prng 1.2s ease infinite;
}
@keyframes prng{
  0%{box-shadow:0 0 0 0 rgba(200,130,255,.5)}
  70%{box-shadow:0 0 0 10px rgba(200,130,255,0)}
  100%{box-shadow:0 0 0 0 rgba(200,130,255,0)}
}
.ap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.12);z-index:5;opacity:0;transition:opacity .22s;border-radius:0 0 var(--radius) var(--radius)}
.apf{height:100%;background:linear-gradient(90deg,#c8f,#a8efff);width:0%;transition:width .5s linear}
.card.playing .ap{opacity:1}
.click-hint{
  position:absolute;top:10px;left:10px;z-index:4;
  font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
  background:rgba(0,0,0,.3);padding:3px 8px;border-radius:6px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;transition:opacity .28s;
  border:1px solid rgba(255,255,255,.1);
}
.card:hover .click-hint{opacity:1}

.cm{padding:10px 2px 0}
.ct2{
  font-size:11px;font-weight:800;letter-spacing:.06em;
  color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ca{font-size:9px;color:var(--ink2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.08em}
.cy{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.06em}

/* SKELETON */
.sk{width:calc((100vw - 4rem - 60px) / 4);flex-shrink:0}
.skc{
  width:100%;aspect-ratio:1/1;border-radius:var(--radius);
  background:rgba(255,255,255,.4);
  border:1px solid var(--glass-border);
  overflow:hidden;position:relative;
}
.skc::after,.skl::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.05) 50%,transparent 75%);
  background-size:200% 100%;animation:sh 1.5s ease infinite;
}
@keyframes sh{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skl{height:8px;border-radius:4px;background:rgba(255,255,255,.05);margin-top:8px;position:relative;overflow:hidden}

/* ══ STATS ══════════════════════════════ */
#view-stats{padding:2rem;display:none}
.stats-hdr{
  font-family:var(--font-display);
  font-size:clamp(2rem,5vw,3rem);
  letter-spacing:.06em;color:#fff;margin-bottom:.3rem;
}
.stats-hdr em{
  font-style:normal;
  background:linear-gradient(135deg,#7c3aed,#0ea5e9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stats-sub{font-size:8px;letter-spacing:.18em;color:var(--muted);margin-bottom:2rem}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.chart-card{
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:1.3rem 1.5rem;
  box-shadow:var(--sh-glass);
}
.chart-title{font-size:8px;letter-spacing:.2em;color:var(--muted);margin-bottom:1.1rem}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
.nc{
  background:rgba(255,255,255,.5);

<script>

"use strict";

/* ── CONFIG ──────────────────────────────── */
var PROXIES = [
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); }
];
var PER_PAGE = 100, MAX_PAGES = 10, DZ_DELAY = 180, FADE_S = 0.3, VOL = 0.6;
var BG_BASE = ''; // glow handled via #glow-blob

/* ── STATE ───────────────────────────────── */
var albums = [], aMap = {}, colorCache = {}, lastTrackIdx = {};
var curAudio = null, curCard = null, progTimer = null;
var activeFilter = 'all', activeProxy = null, useSynth = false;
var discogsUser = '', discogsToken = '';

/* ── UTILS ───────────────────────────────── */
function gid(x) { return document.getElementById(x); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
function show(elId) {
  ['setup','loading','app'].forEach(function(n) {
    var e = gid(n); e.style.display = 'none'; e.style.flexDirection = '';
  });
  var e = gid(elId); e.style.display = 'flex'; e.style.flexDirection = 'column';
}
function setStatus(msg, pct) {
  gid('lst').textContent = msg;
  if (pct != null) gid('pf').style.width = pct + '%';
}
function showErr(m) {
  var e = gid('errbox'); e.style.display = 'block'; e.textContent = m;
}

/* ── NETWORK ─────────────────────────────── */
function timedFetch(url, ms) {
  return new Promise(function(resolve, reject) {
    var t = setTimeout(function() { reject(new Error('timeout')); }, ms);
    fetch(url)
      .then(function(r) { clearTimeout(t); resolve(r); })
      .catch(function(e) { clearTimeout(t); reject(e); });
  });
}

async function proxiedFetch(url) {
  if (activeProxy) {
    try {
      var r = await timedFetch(activeProxy(url), 9000);
      if (r && r.ok) return r;
    } catch(e) { activeProxy = null; }
  }
  for (var i = 0; i < PROXIES.length; i++) {
    try {
      var r2 = await timedFetch(PROXIES[i](url), 9000);
      if (r2 && r2.ok) { activeProxy = PROXIES[i]; return r2; }
    } catch(e2) {}
  }
  return null;
}

/* ── COLOR ───────────────────────────────── */
function hashColor(album) {
  var s = album.artist + album.title, h = 5381;
  for (var i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  var hue = Math.abs(h) % 360;
  var sat = 60 + (Math.abs(h >> 8) % 25);
  var lit = 38 + (Math.abs(h >> 16) % 16);
  var s2 = sat/100, l = lit/100, c2 = (1 - Math.abs(2*l-1)) * s2;
  var x = c2 * (1 - Math.abs((hue/60) % 2 - 1)), m = l - c2/2, r,g,b;
  if(hue<60){r=c2;g=x;b=0;}else if(hue<120){r=x;g=c2;b=0;}
  else if(hue<180){r=0;g=c2;b=x;}else if(hue<240){r=0;g=x;b=c2;}
  else if(hue<300){r=x;g=0;b=c2;}else{r=c2;g=0;b=x;}
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

function extractColorFromImg(img) {
  try {
    var c = document.createElement('canvas'); c.width = c.height = 24;
    var ctx = c.getContext('2d', {willReadFrequently: true});
    ctx.drawImage(img, 0, 0, 24, 24);
    var d = ctx.getImageData(0,0,24,24).data, rS=0, gS=0, bS=0, n=0;
    for (var i = 0; i < d.length; i += 4) {
      var lum = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
      var sat = Math.max(d[i],d[i+1],d[i+2]) - Math.min(d[i],d[i+1],d[i+2]);
      if (lum > 30 && lum < 220 && sat > 20) { rS+=d[i]; gS+=d[i+1]; bS+=d[i+2]; n++; }
    }
    return n >= 8 ? [Math.round(rS/n), Math.round(gS/n), Math.round(bS/n)] : null;
  } catch(e) { return null; }
}

async function fetchColorViaProxy(album) {
  var imgUrl = album.cover || album.thumb;
  if (!imgUrl) return null;
  var proxiesToTry = activeProxy
    ? [activeProxy].concat(PROXIES.filter(function(p){ return p !== activeProxy; }))
    : PROXIES;
  for (var pi = 0; pi < proxiesToTry.length; pi++) {
    try {
      var res = await timedFetch(proxiesToTry[pi](imgUrl), 7000);
      if (!res || !res.ok) continue;
      var blob = await res.blob();
      if (!blob.type.startsWith('image/')) continue;
      var blobUrl = URL.createObjectURL(blob);
      var col = await new Promise(function(resolve) {
        var tmp = new Image();
        tmp.onload = function() { URL.revokeObjectURL(blobUrl); resolve(extractColorFromImg(tmp)); };
        tmp.onerror = function() { URL.revokeObjectURL(blobUrl); resolve(null); };
        tmp.src = blobUrl;
      });
      if (col) return col;
    } catch(e) {}
  }
  return null;
}

async function preloadColors(list) {
  for (var i = 0; i < list.length; i++) {
    var a = list[i];
    if (colorCache[a.id]) continue;
    var col = await fetchColorViaProxy(a);
    colorCache[a.id] = col || hashColor(a);
    await sleep(80);
  }
}

function setGlow(r, g, b) {
  var blob = document.getElementById('glow-blob');
  if (!blob) return;
  blob.style.background =
    'radial-gradient(ellipse 90vw 80vh at 50% 40%, rgba(' + r + ',' + g + ',' + b + ',.28) 0%, rgba(' + r + ',' + g + ',' + b + ',.10) 50%, transparent 75%)';
  blob.style.transition = 'background .6s ease';
}
function clearGlow() {
  var blob = document.getElementById('glow-blob');
  if (blob) blob.style.background = 'radial-gradient(ellipse 80vw 70vh at 50% 40%, rgba(120,80,255,.12) 0%, transparent 70%)';
}

/* ── DISCOGS ─────────────────────────────── */
async function discogsGet(path) {
  var url = 'https://api.discogs.com' + path +
    (path.indexOf('?') >= 0 ? '&' : '?') +
    'token=' + encodeURIComponent(discogsToken);
  var res = null;
  try { res = await timedFetch(url, 9000); } catch(e) {}
  if (!res || !res.ok) res = await proxiedFetch(url);
  if (!res) throw new Error('Could not reach Discogs. Try running via python3 -m http.server 8080');
  if (res.status === 401) throw new Error('Invalid token — check discogs.com/settings/developers');
  if (res.status === 404) throw new Error('User "' + discogsUser + '" not found on Discogs');
  if (res.status === 429) throw new Error('Rate limited — wait a minute and try again');
  if (!res.ok) {
    var j = await res.json().catch(function(){ return {}; });
    throw new Error(j.message || 'Discogs error ' + res.status);
  }
  return res.json();
}

async function loadCollection() {
  setStatus('Fetching page 1…', 8);
  var first = await discogsGet('/users/' + encodeURIComponent(discogsUser) +
    '/collection/folders/0/releases?per_page=' + PER_PAGE + '&page=1&sort=added&sort_order=desc');
  var total = first.pagination.items;
  var pages = Math.min(Math.ceil(total / PER_PAGE), MAX_PAGES);
  var all = first.releases.map(mapR);
  setStatus('Found ' + total + ' records…', 20);
  for (var p = 2; p <= pages; p++) {
    var d = await discogsGet('/users/' + encodeURIComponent(discogsUser) +
      '/collection/folders/0/releases?per_page=' + PER_PAGE + '&page=' + p + '&sort=added&sort_order=desc');
    all = all.concat(d.releases.map(mapR));
    setStatus('Page ' + p + ' of ' + pages + '…', 20 + ((p-1)/(pages-1||1))*32);
    gid('lc').textContent = all.length + ' / ' + total + ' records';
  }
  return all;
}

function mapR(r) {
  var b = r.basic_information;
  var artist = (b.artists || []).map(function(a){ return a.name.replace(/\s*\(\d+\)$/, ''); }).join(', ');
  var yr = b.year && b.year !== 0 ? Number(b.year) : null;
  return {
    id: r.id, releaseId: b.id, title: b.title, artist: artist,
    year: yr, yearDisplay: yr ? String(yr) : '—',
    genres: b.genres || [], styles: b.styles || [],
    labels: (b.labels || []).map(function(l){ return l.name; }),
    formats: (b.formats || []).map(function(f){ return f.name; }),
    cover: b.cover_image || b.thumb || '',
    thumb: b.thumb || b.cover_image || '',
    previewTracks: [], audioState: 'pending'
  };
}

/* ── ITUNES + AUDIO MATCHING ─────────────── */
async function fetchPreviews(album) {
  // iTunes Search API — CORS-friendly, no auth needed
  var term = encodeURIComponent(album.artist + ' ' + album.title);
  var url = 'https://itunes.apple.com/search?term=' + term + '&media=music&entity=song&limit=25&version=2';
  try {
    var res = await timedFetch(url, 10000);
    if (res && res.ok) {
      var d = await res.json();
      if (d.results && d.results.length) {
        var al = album.title.toLowerCase(), ar = album.artist.toLowerCase(), matched = [];
        for (var i = 0; i < d.results.length; i++) {
          var r = d.results[i];
          if (!r.previewUrl) continue;
          var rAl = (r.collectionName || '').toLowerCase();
          var rAr = (r.artistName || '').toLowerCase();
          var score = 0;
          if (rAr.indexOf(ar) >= 0 || ar.indexOf(rAr) >= 0) score += 3;
          if (rAl.indexOf(al) >= 0 || al.indexOf(rAl) >= 0) score += 3;
          ar.split(' ').forEach(function(w){ if(w.length>2 && rAr.indexOf(w)>=0) score++; });
          al.split(' ').forEach(function(w){ if(w.length>2 && rAl.indexOf(w)>=0) score++; });
          if (score >= 2) matched.push({url: r.previewUrl, track: r.trackName, score: score});
        }
        matched.sort(function(a,b){ return b.score - a.score; });
        var seen = {}, unique = [];
        matched.forEach(function(t){ if(!seen[t.url]){ seen[t.url]=1; unique.push(t); } });
        if (unique.length) return unique;
      }
    }
  } catch(e) {}
  // Deezer via proxy fallback
  try {
    var url2 = 'https://api.deezer.com/search?q=' + encodeURIComponent(album.artist + ' ' + album.title) + '&limit=15';
    var res2 = await proxiedFetch(url2);
    if (res2 && res2.ok) {
      var d2 = await res2.json();
      if (d2.data && d2.data.length) {
        var al2 = album.title.toLowerCase();
        var dz = d2.data
          .filter(function(t){ return t.preview && t.preview.length > 4; })
          .filter(function(t){ return !t.album || !t.album.title || t.album.title.toLowerCase().indexOf(al2) >= 0; })
          .map(function(t){ return {url: t.preview, track: t.title}; });
        if (dz.length) return dz;
      }
    }
  } catch(e) {}
  return [];
}

function pickTrack(albumId) {
  var tracks = aMap[albumId];
  if (!tracks || !tracks.length) return null;
  if (tracks.length === 1) return tracks[0];
  var last = lastTrackIdx[albumId] != null ? lastTrackIdx[albumId] : -1;
  var candidates = [];
  for (var i = 0; i < tracks.length; i++) { if (i !== last) candidates.push(i); }
  var idx = candidates[Math.floor(Math.random() * candidates.length)];
  lastTrackIdx[albumId] = idx;
  return tracks[idx];
}

async function matchAudioBg(list) {
  var matched = 0;
  for (var i = 0; i < list.length; i++) {
    var a = list[i];
    a.audioState = 'loading'; updateAS(a.id, 'loading', '');
    if (useSynth) {
      a.audioState = 'synth'; matched++;
      updateAS(a.id, 'synth', 'synthesized');
    } else {
      var tracks = await fetchPreviews(a);
      if (tracks.length) {
        a.audioState = 'ready'; matched++;
        aMap[a.id] = tracks;
        // Preload first few audio elements
        tracks.slice(0, 3).forEach(function(t) {
          if (!t.audio) {
            t.audio = new Audio();
            t.audio.src = t.url;
            t.audio.preload = 'auto';
            t.audio.load();
          }
        });
        updateAS(a.id, 'ready', tracks.length + ' track' + (tracks.length > 1 ? 's' : ''));
      } else {
        a.audioState = 'missing';
        updateAS(a.id, 'missing', '');
      }
      if (i < list.length - 1) await sleep(DZ_DELAY);
    }
    updateStats(list, matched);
  }
}

/* ── SYNTH ───────────────────────────────── */
var SCALES = {
  Electronic:[0,3,7,10,14], Rock:[0,4,7,11,14], 'Hip Hop':[0,3,5,7,10],
  Jazz:[0,4,7,11,16], Pop:[0,4,7,9,12], default:[0,3,7,10]
};
var BASE_NOTES = [196,220,246,261,293,329,349,392];
var synthCtx = null, synthNodes = [];

function getSC() {
  if (!synthCtx) synthCtx = new (window.AudioContext || window.webkitAudioContext)();
  return synthCtx;
}
function playSynth(album, check) {
  var ctx = getSC();
  synthNodes.forEach(function(n){ try{n.stop();}catch(e){} });
  synthNodes = [];
  var genre = album.genres[0] || 'default';
  var scale = SCALES[genre] || SCALES.default;
  var base = BASE_NOTES[album.id % BASE_NOTES.length];
  var now = ctx.currentTime;
  var master = ctx.createGain(); master.gain.value = VOL; master.connect(ctx.destination);
  scale.forEach(function(semi, i) {
    var freq = base * Math.pow(2, semi/12);
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = ['triangle','sine','triangle','sine'][i%4]; osc.frequency.value = freq;
    var t = now + i*0.18, dur = 2.2;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.08, t+0.07);
    gain.gain.linearRampToValueAtTime(0.04, t+dur*0.8);
    gain.gain.linearRampToValueAtTime(0, t+dur);
    osc.connect(gain); gain.connect(master); osc.start(t); osc.stop(t+dur);
    synthNodes.push(osc);
  });
  var loopMs = (scale.length * 0.18 + 2.2) * 900;
  synthNodes._lt = setTimeout(function(){ if(check && check()) playSynth(album, check); }, loopMs);
}
function stopSynth() {
  synthNodes.forEach(function(n){ try{n.stop();}catch(e){} });
  if (synthNodes._lt) clearTimeout(synthNodes._lt);
  synthNodes = [];
}

function buildCard(album, idx) {

function updateAS(albumId, state, info) {
  var se = document.querySelector('[data-as="' + albumId + '"]');
  var te = document.querySelector('[data-at="' + albumId + '"]');
  if (!se) return;
  se.className = 'ovs';
  if (state === 'ready') {
    se.classList.add('has'); se.textContent = '♫ ' + info;
    if (te) te.textContent = 'click for details';
  } else if (state === 'synth') {
    se.classList.add('has'); se.textContent = '◈ synthesized';
    if (te) te.textContent = '';
  } else if (state === 'missing') {
    se.classList.add('none'); se.textContent = '— no preview';
  } else {
    se.textContent = '◌ matching…';
  }
}

/* ── AUDIO PLAYBACK ──────────────────────── */
function onHoverIn(album, card, covEl) {
  if (curCard === card) return;
  hoverOutAll();
  curCard = card; card.classList.add('playing');

  // Background glow
  var col = colorCache[album.id] || hashColor(album);
  setGlow(col[0], col[1], col[2]);

  if (album.audioState === 'synth') {
    var looping = true;
    gid('np-trk').textContent = album.artist + ' — ' + album.title + ' (synth)';
    gid('np').classList.add('on');
    playSynth(album, function(){ return looping; });
    card._stopSynth = function() { looping = false; stopSynth(); };

  } else if (aMap[album.id] && album.audioState === 'ready') {
    var trackObj = pickTrack(album.id);
    if (!trackObj) return;
    if (!trackObj.audio) {
      trackObj.audio = new Audio();
      trackObj.audio.src = trackObj.url;
      trackObj.audio.preload = 'auto';
    }
    var audio = trackObj.audio; curAudio = audio;
    audio.currentTime = 0; audio.volume = 0;
    audio.play().catch(function(){});
    fadeVol(audio, 0, VOL, FADE_S);
    gid('np-trk').textContent = album.artist + ' — ' + (trackObj.track || album.title);
    gid('np').classList.add('on');
    clearInterval(progTimer);
    var fill = document.querySelector('[data-ap="' + album.id + '"]');
    if (fill) {
      progTimer = setInterval(function() {
        if (audio.duration) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }, 400);
    }
    audio.onended = function() { audio.pause(); audio.currentTime = 0; };
  }
}

function onHoverOut(album, card) {
  if (curCard !== card) return;
  card.classList.remove('playing'); clearGlow();
  gid('np').classList.remove('on'); clearInterval(progTimer);
  var fill = document.querySelector('[data-ap="' + album.id + '"]');
  if (fill) fill.style.width = '0%';
  if (card._stopSynth) { card._stopSynth(); card._stopSynth = null; }
  stopAudio(); curCard = null;
}

function hoverOutAll() {
  if (curCard) {
    curCard.classList.remove('playing');
    if (curCard._stopSynth) { curCard._stopSynth(); curCard._stopSynth = null; }
  }
  clearGlow(); gid('np').classList.remove('on'); clearInterval(progTimer);
  stopAudio(); curCard = null;
}

function stopAudio() {
  if (curAudio) {
    var a = curAudio;
    fadeVol(a, a.volume, 0, FADE_S, function(){ a.pause(); a.currentTime = 0; });
    curAudio = null;
  }
  stopSynth();
}

function fadeVol(audio, from, to, dur, done) {
  var steps = 14, intv = (dur*1000)/steps, delta = (to-from)/steps, s = 0;
  var t = setInterval(function() {
    s++; audio.volume = Math.min(1, Math.max(0, from + delta*s));
    if (s >= steps) { clearInterval(t); audio.volume = to; if (done) done(); }
  }, intv);
}

function updateStats(list, matched) {
  var total = list.length;
  var years = list.map(function(a){ return a.year; }).filter(function(y){ return y && !isNaN(y); });
  var span = years.length ? Math.max.apply(null, years) - Math.min.apply(null, years) : 0;
  gid('s-tot').textContent = total;
  gid('s-aud').textContent = matched;
  gid('s-pct').textContent = total ? Math.round(matched/total*100) + '%' : '0%';
  gid('s-spn').textContent = span || '—';
  gid('srow').style.display = 'flex';
  gid('top-right').innerHTML = '<strong>' + total + '</strong> records &nbsp;·&nbsp; <strong>' + matched + '</strong> previews';
}

/* ── STATS PAGE ──────────────────────────── */
function buildStats(list) {
  var years = [], genres = {}, artists = {}, formats = {}, decades = {};
  list.forEach(function(a) {
    if (a.year && !isNaN(a.year)) {
      years.push(a.year);
      var dec = Math.floor(a.year / 10) * 10;
      decades[dec] = (decades[dec] || 0) + 1;
    }
    (a.genres || []).forEach(function(g){ genres[g] = (genres[g]||0)+1; });
    (a.styles || []).forEach(function(s){ genres[s] = (genres[s]||0)+1; });
    if (a.artist) artists[a.artist] = (artists[a.artist]||0)+1;
    (a.formats || []).forEach(function(f){ formats[f] = (formats[f]||0)+1; });
  });

  var minY = years.length ? Math.min.apply(null,years) : null;
  var maxY = years.length ? Math.max.apply(null,years) : null;
  var withAudio = list.filter(function(a){ return a.audioState==='ready'||a.audioState==='synth'; }).length;
  var uniqueArtists = Object.keys(artists).length;

  gid('stats-sub').textContent = list.length + ' records' +
    (years.length ? ' · ' + minY + ' – ' + maxY : '') +
    ' · ' + uniqueArtists + ' artists';

  var grid = gid('charts-grid'); grid.innerHTML = '';

  // At a glance
  var c0 = document.createElement('div'); c0.className = 'chart-card';
  c0.innerHTML = '<div class="chart-title">At a glance</div>' +
    '<div class="num-grid">' +
    '<div class="nc"><div class="n">' + list.length + '</div><div class="l">Records</div></div>' +
    '<div class="nc"><div class="n">' + uniqueArtists + '</div><div class="l">Artists</div></div>' +
    '<div class="nc"><div class="n">' + Object.keys(genres).length + '</div><div class="l">Genres</div></div>' +
    '<div class="nc"><div class="n">' + (minY||'—') + '</div><div class="l">Earliest</div></div>' +
    '<div class="nc"><div class="n">' + (maxY||'—') + '</div><div class="l">Latest</div></div>' +
    '<div class="nc"><div class="n">' + withAudio + '</div><div class="l">With Audio</div></div>' +
    '</div>';
  grid.appendChild(c0);

  // Decades
  var sortedDec = Object.keys(decades).map(Number).sort(function(a,b){return a-b;});
  if (sortedDec.length) {
    var c1 = document.createElement('div'); c1.className = 'chart-card';
    var maxDec = Math.max.apply(null, sortedDec.map(function(d){return decades[d];}));
    var tlH = '<div class="chart-title">Albums by decade</div><div class="tl-wrap">';
    sortedDec.forEach(function(dec) {
      var cnt = decades[dec];
      var px = Math.max(2, Math.round(cnt/maxDec*70));
      tlH += '<div class="tl-col"><div class="tl-bar" style="height:' + px + 'px" title="' + dec + 's: ' + cnt + '"></div><div class="tl-lbl">' + String(dec).slice(2) + 's</div></div>';
    });
    tlH += '</div>'; c1.innerHTML = tlH; grid.appendChild(c1);
  }

  // Genres
  var sortedG = Object.keys(genres).sort(function(a,b){return genres[b]-genres[a];}).slice(0,10);
  if (sortedG.length) {
    var c2 = document.createElement('div'); c2.className = 'chart-card';
    var maxG = genres[sortedG[0]];
    var gH = '<div class="chart-title">Top genres &amp; styles</div>';
    sortedG.forEach(function(g) {
      var pct = Math.round(genres[g]/maxG*100);
      gH += '<div class="bar-row"><div class="bar-lbl">' + esc(g) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="bar-cnt">' + genres[g] + '</div></div>';
    });
    c2.innerHTML = gH; grid.appendChild(c2);
  }

  // Artists
  var sortedA = Object.keys(artists).filter(function(a){return artists[a]>1;})
    .sort(function(a,b){return artists[b]-artists[a];}).slice(0,10);
  if (sortedA.length) {
    var c3 = document.createElement('div'); c3.className = 'chart-card';
    var maxA = artists[sortedA[0]];
    var aH = '<div class="chart-title">Most collected artists</div>';
    sortedA.forEach(function(a) {
      var pct = Math.round(artists[a]/maxA*100);
      aH += '<div class="bar-row"><div class="bar-lbl">' + esc(a) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="bar-cnt">' + artists[a] + '</div></div>';
    });
    c3.innerHTML = aH; grid.appendChild(c3);
  }

  // Formats
  var sortedF = Object.keys(formats).sort(function(a,b){return formats[b]-formats[a];}).slice(0,8);
  if (sortedF.length) {
    var c4 = document.createElement('div'); c4.className = 'chart-card';
    var maxF = formats[sortedF[0]];
    var fH = '<div class="chart-title">Formats</div>';
    sortedF.forEach(function(f) {
      var pct = Math.round(formats[f]/maxF*100);
      fH += '<div class="bar-row"><div class="bar-lbl">' + esc(f) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="bar-cnt">' + formats[f] + '</div></div>';
    });
    c4.innerHTML = fH; grid.appendChild(c4);
  }

  // Year distribution
  if (years.length > 3 && minY && maxY) {
    var c5 = document.createElement('div'); c5.className = 'chart-card';
    var yBuckets = {};
    years.forEach(function(y){ yBuckets[y] = (yBuckets[y]||0)+1; });
    var allYears = [];
    for (var y = minY; y <= maxY; y++) allYears.push(y);
    var maxYC = Math.max.apply(null, allYears.map(function(y){ return yBuckets[y]||0; }));
    var yH = '<div class="chart-title">Year by year (' + minY + ' – ' + maxY + ')</div><div class="tl-wrap" style="gap:2px">';
    allYears.forEach(function(yr) {
      var cnt = yBuckets[yr] || 0;
      if (cnt > 0) {
        var px = Math.max(2, Math.round(cnt/maxYC*70));
        yH += '<div class="tl-col" style="min-width:3px"><div class="tl-bar" style="height:' + px + 'px;background:var(--accent2)" title="' + yr + ': ' + cnt + '"></div></div>';
      } else {
        yH += '<div class="tl-col" style="min-width:3px"><div style="height:2px"></div></div>';
      }
    });
    yH += '</div>'; c5.innerHTML = yH; grid.appendChild(c5);
  }
}

async function loadDemo(synth) {
  useSynth = synth; show('loading'); setStatus('Loading demo…', 30);
  albums = DEMO.map(function(a){ return Object.assign({}, a); });
  await sleep(500);
  show('app');
  gid('view-collection').style.display = 'block';
  gid('view-stats').style.display = 'none';
  gid('ht').innerHTML = '<em>Demo</em> collection';
  gid('hs').textContent = albums.length + ' albums · hover to preview · click for details';
  renderCarousel(albums);
  updateStats(albums, 0);
  buildStats(albums);
  matchAudioBg(albums);
  preloadColors(albums);
}

/* ── EVENTS ──────────────────────────────── */
gid('btn-load').addEventListener('click', function() {
  var u = gid('inp-user').value.trim(), t = gid('inp-token').value.trim();
  if (!u) { showErr('Please enter your Discogs username.'); return; }
  if (!t) { showErr('Please enter your personal access token.'); return; }
  startLoad(u, t);
});
gid('inp-token').addEventListener('keydown', function(e) { if(e.key === 'Enter') gid('btn-load').click(); });
gid('btn-demo').addEventListener('click', function() { loadDemo(false); });
gid('btn-synth').addEventListener('click', function() { loadDemo(true); });
gid('btn-reset').addEventListener('click', function() {
  hoverOutAll(); aMap = {}; lastTrackIdx = {}; albums = []; colorCache = {};
  gid('ct').innerHTML = ''; gid('srow').style.display = 'none';
  discogsUser = ''; discogsToken = ''; clearGlow(); show('setup');
});
gid('modal-close').addEventListener('click', closeModal);
gid('modal-overlay').addEventListener('click', function(e) { if(e.target === gid('modal-overlay')) closeModal(); });

document.querySelector('.nav-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.ntab'); if (!btn) return;
  document.querySelectorAll('.ntab').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  var v = btn.dataset.view;
  gid('view-collection').style.display = v === 'collection' ? 'block' : 'none';
  gid('view-stats').style.display = v === 'stats' ? 'block' : 'none';
  if (v === 'stats' && albums.length) buildStats(albums);
});

gid('frow').addEventListener('click', function(e) {
  var b = e.target.closest('.fb'); if (!b) return;
  document.querySelectorAll('.fb').forEach(function(x){ x.classList.remove('on'); });
  b.classList.add('on'); activeFilter = b.dataset.f;
  hoverOutAll(); renderCarousel(albums);
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); hoverOutAll(); }
  if (e.key === ' ' && e.target.tagName !== 'INPUT') { e.preventDefault(); hoverOutAll(); }
});

/* ── INIT ────────────────────────────────── */
show('setup');

/* ── CAROUSEL ARROW BUTTONS ─────────────── */
(function(){
  var cs = document.getElementById('cs');
  var prev = document.getElementById('carr-prev');
  var next = document.getElementById('carr-next');
  if(!cs || !prev || !next) return;

  function getScrollAmount(){
    // scroll by the width of one card + gap
    var card = cs.querySelector('.card');
    return card ? card.offsetWidth + 20 : 300;
  }

  function updateButtons(){
    prev.disabled = cs.scrollLeft <= 4;
    next.disabled = cs.scrollLeft >= cs.scrollWidth - cs.clientWidth - 4;
  }

  prev.addEventListener('click', function(){
    cs.scrollBy({left: -getScrollAmount() * 2, behavior:'smooth'});
  });
  next.addEventListener('click', function(){
    cs.scrollBy({left: getScrollAmount() * 2, behavior:'smooth'});
  });
  cs.addEventListener('scroll', updateButtons, {passive:true});
  // init
  setTimeout(updateButtons, 500);
})();

</script>
